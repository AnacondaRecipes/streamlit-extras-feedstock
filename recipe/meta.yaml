{% set name = "streamlit-extras" %}
{% set version = "0.7.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/arnaudmiribel/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: f497b2e1a24816ac4a65087f5e32617e3d888f993da321c034039a18c6cf37cb
  patches:
    - patch/0001-downgrade-htbuilder-lowerbound.patch

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<39 or py>=314]

requirements:
  build:
    - patch  # [not win]
    - m2-patch  # [win]
  host:
    - pip
    - python
    - poetry-core
    - hatchling
  run:
    - python
    - streamlit >=1.37.0,<1.40.0
    - prometheus_client >=0.20.0
    - st-annotated-text >=4.0.1
    - st-theme >=1.2.3
    - streamlit-embedcode >=0.1.2
    - streamlit-keyup >=0.2.4
    - protobuf >=5.27.3
    - streamlit-camera-input-live >=0.2.0
    - streamlit-vertical-slider >=2.5.5
    - streamlit-toggle-switch >=1.0.2
    # Temporarily diverging from upstream to fix a conflict that happens in a circular dependency.
    - htbuilder 0.6.1
    - streamlit-faker >=0.0.3
    - streamlit-card >=1.0.2
    - markdownlit >=0.0.7
    - streamlit-image-coordinates >=0.1.9
    - snowflake-snowpark-python >=1.30.0
    - entrypoints >=0.4
    - prometheus_client >=0.14.0
    - st-theme >=1.0.1
    - validators >=0.33.0
    - plotly >=5.23.0
    - streamlit-avatar >=0.1.3
    - streamlit-notify >=0.3.1

test:
  source_files:
    - tests
  imports:
    - streamlit_extras
  commands:
    - pip check
    - pytest -v tests
  requires:
    - pip
    - pytest
    - pandas

about:
  home: https://share.streamlit.io
  summary: A library to discover, try, install and share Streamlit extras
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  description: streamlit-extras is a Python library putting together useful Streamlit bits of code (extras).
  dev_url: https://github.com/arnaudmiribel/streamlit-extras
  doc_url: https://arnaudmiribel.github.io/streamlit-extras

extra:
  recipe-maintainers:
    - ELundby45
